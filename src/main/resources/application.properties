# ============================================================
# MySQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/protectionlogiciels?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=infopro_super_secret_key_change_this_in_production_min_256bits
app.jwt.expiration-ms=86400000

# ============================================================
# Server
# ============================================================
server.port=8080